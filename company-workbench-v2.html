<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>公司项目工作台 V2</title>
  <style>
    :root {
      --bg: #f6f3eb;
      --panel: #fff;
      --soft: #fbf9f4;
      --ink: #171614;
      --muted: #7d7569;
      --line: #e4dccd;
      --dark: #232018;
      --gold: #efbf38;
      --gold-soft: #fff3c5;
      --green: #31845d;
      --green-soft: #e7f4ec;
      --blue: #2d6f9f;
      --blue-soft: #e5f0f8;
      --red: #c74339;
      --red-soft: #fff0ed;
      --radius: 8px;
      --shadow: 0 10px 30px rgba(35, 32, 24, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; border: 0; }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
    }

    .sidebar {
      background: var(--dark);
      color: #fff;
      padding: 22px 16px;
      display: flex;
      flex-direction: column;
      overflow: auto;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      margin-bottom: 16px;
    }
    .mark {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--gold);
      color: var(--dark);
      font-weight: 900;
      font-family: serif;
      font-size: 21px;
    }
    .brand b { display: block; font-size: 17px; line-height: 1.2; }
    .brand span { display: block; margin-top: 3px; font-size: 11px; color: rgba(255,255,255,.55); }

    .project-box {
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.07);
      border-radius: var(--radius);
      padding: 13px;
      margin-bottom: 16px;
    }
    .project-box label { display:block; font-size:11px; color:rgba(255,255,255,.48); margin-bottom:7px; }
    .project-box select {
      width: 100%;
      height: 36px;
      color: #fff;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 7px;
      padding: 0 9px;
      outline: none;
    }

    .group-title {
      margin: 13px 9px 6px;
      font-size: 11px;
      letter-spacing: .08em;
      color: rgba(255,255,255,.38);
      font-weight: 900;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .nav button {
      width: 100%;
      min-height: 38px;
      border-radius: var(--radius);
      background: transparent;
      color: rgba(255,255,255,.72);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 11px;
      text-align: left;
      transition: background .15s, color .15s;
    }
    .nav button.child {
      width: calc(100% - 16px);
      margin-left: 16px;
      min-height: 34px;
      font-size: 13px;
    }
    .nav button.active {
      color: var(--dark);
      background: var(--gold);
      font-weight: 900;
    }
    .nav button:not(.active):hover { background: rgba(255,255,255,.08); color:#fff; }
    .nav small { color: inherit; opacity: .65; font-size: 11px; }

    .sidebar-note {
      margin-top: auto;
      border-radius: var(--radius);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      padding: 12px;
      color: rgba(255,255,255,.65);
      font-size: 12px;
      line-height: 1.7;
    }

    .main {
      min-width: 0;
      overflow: auto;
      padding: 24px 28px 36px;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      color: #aaa194;
      margin-bottom: 6px;
    }
    h1 { margin: 0; font-size: 28px; line-height: 1.08; letter-spacing: 0; }
    .sub { margin-top: 8px; color: var(--muted); font-size: 13px; }

    .btn {
      height: 36px;
      padding: 0 13px;
      border-radius: 99px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }
    .btn.primary { background: var(--gold); border-color: var(--gold); }
    .btn.danger { background: var(--red-soft); border-color: #ffc9c1; color: var(--red); }

    .reminder {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 11px 13px;
      background: #fff9e6;
      border: 1px solid #efd27a;
      border-radius: var(--radius);
      margin-bottom: 16px;
      color: #765600;
      font-size: 13px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .panel.pad { padding: 16px; }
    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .summary-hero {
      display: grid;
      grid-template-columns: 190px 1fr;
      overflow: hidden;
    }
    .countdown {
      background: var(--dark);
      color: #fff;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 174px;
    }
    .countdown strong { font-size: 56px; line-height: .9; color: var(--gold); }
    .countdown span { color: rgba(255,255,255,.66); font-size: 13px; }
    .summary-body { padding: 22px; }
    .progress {
      height: 10px;
      border-radius: 99px;
      background: #eee7da;
      overflow: hidden;
    }
    .progress span {
      display: block;
      height: 100%;
      width: 54%;
      background: linear-gradient(90deg, var(--gold), var(--green));
      border-radius: inherit;
    }
    .stat-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .stat {
      padding: 10px;
      border: 1px solid #eee7da;
      border-radius: 7px;
      background: var(--soft);
    }
    .stat b { display:block; font-size: 18px; }
    .stat span { color: var(--muted); font-size: 12px; }

    .risk-list { display: flex; flex-direction: column; gap: 9px; }
    .risk {
      padding: 10px;
      border-radius: 7px;
      background: var(--red-soft);
      border: 1px solid #ffcfc8;
      font-size: 13px;
      line-height: 1.55;
    }
    .risk b { color: var(--red); }

    .center-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .center-card {
      padding: 15px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .center-card:hover { transform: translateY(-1px); border-color: var(--gold); box-shadow: 0 0 0 3px rgba(239,191,56,.18), var(--shadow); }
    .center-card h3 { margin: 0 0 5px; font-size: 15px; }
    .center-card .rate { font-size: 26px; font-weight: 900; margin: 12px 0 8px; }

    .role-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 13px;
    }
    .search {
      flex: 1;
      min-width: 210px;
      height: 36px;
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 99px;
      padding: 0 13px;
      outline: none;
    }
    .seg {
      height: 32px;
      padding: 0 11px;
      border-radius: 99px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .seg.active { background: var(--dark); border-color: var(--dark); color:#fff; }

    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task {
      display: grid;
      grid-template-columns: 24px 1fr 76px 82px;
      gap: 10px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 7px;
      cursor: pointer;
    }
    .task.selected { border-color: var(--gold); background: #fffdf5; }
    .check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid #cfc6b5;
      background: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }
    .check.done { background: var(--gold); border-color: var(--gold); }
    .task-name { font-weight: 900; font-size: 13px; }
    .task-note { margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .tag {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 58px;
      height: 24px;
      border-radius: 99px;
      border: 1px solid transparent;
      font-size: 11px;
      font-weight: 900;
    }
    .tag.todo { background: #f3efe8; border-color: #e1d9ca; color: #73695a; }
    .tag.doing { background: var(--blue-soft); border-color: #bad5eb; color: var(--blue); }
    .tag.done { background: var(--green-soft); border-color: #b9dfca; color: var(--green); }
    .tag.risk { background: var(--red-soft); border-color: #ffc9c1; color: var(--red); }
    .tag.review { background: var(--gold-soft); border-color: #efd27a; color: #765600; }

    .detail { position: sticky; top: 0; padding: 16px; }
    .detail h2 { margin: 0 0 6px; font-size: 18px; }
    .field { padding-top: 14px; margin-top: 14px; border-top: 1px solid var(--line); }
    .label { font-size: 11px; color: #aaa194; font-weight: 900; margin-bottom: 7px; }
    textarea {
      width: 100%;
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      padding: 10px;
      resize: vertical;
      line-height: 1.65;
      outline: none;
    }
    .upload {
      width: 100%;
      min-height: 114px;
      border: 1.5px dashed #cfc6b5;
      border-radius: 8px;
      background: var(--soft);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 16px;
    }
    .upload:hover, .upload.dragging { border-color: var(--gold); background: #fffaf0; }
    .upload b { display:block; color: var(--ink); margin-bottom: 4px; }
    .asset-list { display:flex; flex-direction:column; gap:8px; margin-top: 10px; }
    .asset {
      display: grid;
      grid-template-columns: 46px 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .thumb {
      width: 46px;
      height: 46px;
      border-radius: 7px;
      overflow: hidden;
      background: #eee6d8;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 900;
      position: relative;
    }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .version {
      position:absolute;
      right:4px;
      top:4px;
      height:18px;
      padding:0 6px;
      border-radius:99px;
      background: rgba(35,32,24,.84);
      color:#fff;
      font-size:10px;
      display:inline-flex;
      align-items:center;
      font-weight:900;
    }
    .asset-name { font-size: 12px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .asset-meta { margin-top:2px; color: var(--muted); font-size: 11px; }
    .small-btn {
      height: 28px;
      padding: 0 9px;
      border-radius: 99px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .image-card {
      overflow: hidden;
      cursor: pointer;
    }
    .image-preview {
      height: 138px;
      background: #eee6d8;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 900;
      position: relative;
    }
    .image-preview img { width:100%; height:100%; object-fit:cover; display:block; }
    .image-info { padding: 10px; }
    .image-info b { display:block; font-size: 13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: var(--dark);
      color:#fff;
      border-radius:99px;
      padding:10px 18px;
      font-size:13px;
      box-shadow: 0 12px 34px rgba(0,0,0,.2);
      transition: transform .2s, opacity .2s;
    }
    .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 1080px) {
      body { overflow:auto; }
      .shell { height:auto; min-height:100vh; grid-template-columns: 220px minmax(0, 1fr); }
      .overview-grid, .role-layout { grid-template-columns: 1fr; }
      .center-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .detail { position: static; }
    }
    @media (max-width: 760px) {
      .shell { display:block; }
      .sidebar { position:sticky; top:0; z-index:10; padding:12px; }
      .project-box, .sidebar-note { display:none; }
      .brand { padding-bottom:10px; margin-bottom:10px; }
      .nav { flex-direction:row; overflow-x:auto; }
      .group-title { display:none; }
      .nav button, .nav button.child { min-width: 112px; margin-left:0; width:auto; justify-content:center; }
      .nav small { display:none; }
      .main { padding:16px; }
      .page-head { display:block; }
      .summary-hero { grid-template-columns:1fr; }
      .stat-grid, .center-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .task { grid-template-columns:24px 1fr; align-items:start; }
      .task > .tag { grid-column:2; width:fit-content; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">初</div>
        <div><b>公司工作台</b><span>项目推进与图片沉淀</span></div>
      </div>
      <div class="project-box">
        <label>当前项目</label>
        <select id="projectSelect">
          <option>5月月底课程活动</option>
          <option>6月招商说明会</option>
          <option>私董会闭门沙龙</option>
        </select>
      </div>
      <nav class="nav" id="nav">
        <button class="active" data-page="overview">项目总览 <small>管理</small></button>
        <button data-page="investment">招商中心 <small>6</small></button>
        <div class="group-title">市场中心</div>
        <button data-page="market">市场总览 <small>12</small></button>
        <button class="child" data-page="design">设计工作台 <small>3</small></button>
        <button class="child" data-page="copy">文案工作台 <small>3</small></button>
        <button class="child" data-page="video">短视频工作台 <small>2</small></button>
        <button class="child" data-page="ops">运营工作台 <small>2</small></button>
        <button class="child" data-page="service">客服工作台 <small>3</small></button>
        <button class="child" data-page="site">现场执行 <small>2</small></button>
        <button data-page="images">项目图片库 <small id="imageCountNav">2</small></button>
      </nav>
      <div class="sidebar-note">岗位工作台只处理本岗位任务；总览页只看整体进度；项目图片库只沉淀最新版图片。</div>
    </aside>

    <main class="main" id="app"></main>
  </div>
  <div class="toast" id="toast">已更新</div>

  <script>
    const roleMap = {
      investment: { title: "招商中心", role: "招商", desc: "更新邀约进度、确认到场人数、上传名单图片或现场可用宣传图。", note: "今日目标：新增确认到场 12 人；高意向客户需二次跟进。" },
      market: { title: "市场中心总览", role: "市场中心", desc: "查看设计、文案、短视频、运营、客服、现场各岗位推进情况。", note: "市场中心今日重点：主视觉定稿、社群预热文案、客服提醒话术。" },
      design: { title: "设计工作台", role: "设计", desc: "处理海报、朋友圈图、二维码图、现场指示牌等图片交付。", note: "距离开课 17 天 · 设计风险 1 项 · 待定稿图片 2 张" },
      copy: { title: "文案工作台", role: "文案", desc: "处理公众号、朋友圈、社群预热、课后复盘文案。", note: "文案页主要编辑内容，不自动进入项目图片库。" },
      video: { title: "短视频工作台", role: "短视频", desc: "处理选题、脚本、拍摄清单、剪辑与发布节奏。", note: "短视频成果暂不进入图片库，只保留在任务记录里。" },
      ops: { title: "运营工作台", role: "运营", desc: "负责排期、协调、提醒、跨岗位阻塞处理。", note: "运营需要检查各岗位交付物是否为最新版。" },
      service: { title: "客服工作台", role: "客服", desc: "处理报名咨询、名单核对、课前提醒、FAQ。", note: "客服可从项目图片库获取最新版海报发给用户。" },
      site: { title: "现场执行", role: "现场", desc: "处理场地、签到、设备、物料、现场照片。", note: "现场照片上传后会自动进入项目图片库。" }
    };

    const tasks = [
      { id: 1, role: "招商", name: "完成第一轮电话邀约", owner: "刘峰", due: "05-17", status: "doing", note: "目标联系120人，目前已联系76人。" },
      { id: 2, role: "招商", name: "确认到场名单达到80人", owner: "刘峰", due: "05-24", status: "risk", note: "当前确认38人，低于计划节奏。" },
      { id: 3, role: "招商", name: "准备招商政策说明话术", owner: "周敏", due: "05-18", status: "doing", note: "费用、权益、名额限制三类问题需要统一口径。" },
      { id: 4, role: "设计", name: "课程主视觉海报", owner: "陈佳", due: "05-16", status: "risk", note: "讲师照片和课程主题需最终确认。" },
      { id: 5, role: "设计", name: "朋友圈九宫格图片", owner: "陈佳", due: "05-18", status: "todo", note: "需根据主视觉延展。" },
      { id: 6, role: "设计", name: "课程二维码图", owner: "陈佳", due: "05-20", status: "todo", note: "报名二维码和客服二维码需要分开导出。" },
      { id: 7, role: "文案", name: "公众号预热推文第一篇", owner: "王蕾", due: "05-17", status: "doing", note: "标题已定，正文还需补成功案例。" },
      { id: 8, role: "文案", name: "社群预热文案", owner: "王蕾", due: "05-20", status: "todo", note: "分为开课前7天、3天、1天三版。" },
      { id: 9, role: "文案", name: "课后复盘宣传稿", owner: "王蕾", due: "06-01", status: "todo", note: "课程结束后补现场照片和学员反馈。" },
      { id: 10, role: "短视频", name: "短视频口播脚本三条", owner: "林森", due: "05-19", status: "doing", note: "第一条已完成，剩余两条围绕课程收益。" },
      { id: 11, role: "短视频", name: "活动当天拍摄清单", owner: "林森", due: "05-27", status: "todo", note: "列出签到、授课、互动、合影等镜头。" },
      { id: 12, role: "运营", name: "项目排期与跨岗协调", owner: "许诺", due: "05-18", status: "doing", note: "每天同步招商、设计、文案和客服关键阻塞。" },
      { id: 13, role: "运营", name: "课前物料最终检查", owner: "许诺", due: "05-29", status: "todo", note: "确认海报、签到表、二维码、现场指引图均为最新版。" },
      { id: 14, role: "客服", name: "整理报名咨询FAQ", owner: "李曼", due: "05-16", status: "done", note: "费用、地点、时间、停车、发票问题已整理。" },
      { id: 15, role: "客服", name: "报名名单信息核对", owner: "李曼", due: "05-25", status: "doing", note: "需要和招商组名单每日同步。" },
      { id: 16, role: "客服", name: "课前提醒短信和微信", owner: "赵晴", due: "05-29", status: "todo", note: "发送定位、时间、注意事项。" },
      { id: 17, role: "现场", name: "场地桌椅与签到台", owner: "何宇", due: "05-28", status: "todo", note: "按80人规模准备，预留10个机动席位。" },
      { id: 18, role: "现场", name: "课件、音响、投影测试", owner: "何宇", due: "05-30", status: "risk", note: "讲师课件还未收到，影响提前测试。" }
    ];

    const images = [
      { id: 1, taskId: 4, type: "海报", name: "课程主视觉海报-方向稿.png", owner: "陈佳", role: "设计", version: 1, status: "待确认", time: "05-14 16:20", dataUrl: "" },
      { id: 2, taskId: 5, type: "朋友圈图", name: "朋友圈九宫格-第一张.png", owner: "陈佳", role: "设计", version: 1, status: "草稿", time: "05-15 09:30", dataUrl: "" }
    ];
    const attachments = [];
    let page = "overview";
    let selectedTaskId = 4;
    let statusFilter = "all";
    let imageFilter = "all";

    const app = document.getElementById("app");
    const toast = document.getElementById("toast");

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }
    function statusText(status) {
      return ({ todo: "未开始", doing: "进行中", done: "已完成", risk: "有风险", review: "待确认" })[status] || status;
    }
    function pageTasks(p = page) {
      if (p === "investment") return tasks.filter(t => t.role === "招商");
      if (p === "market") return tasks.filter(t => ["设计","文案","短视频","运营","客服","现场"].includes(t.role));
      const role = roleMap[p]?.role;
      return role ? tasks.filter(t => t.role === role) : tasks;
    }
    function taskImages(taskId) { return images.filter(img => img.taskId === taskId); }
    function taskFiles(taskId) { return attachments.filter(file => file.taskId === taskId); }
    function imageTypeForTask(task, fileName = "") {
      if (task.name.includes("海报") || task.name.includes("视觉")) return "海报";
      if (task.name.includes("朋友圈") || task.name.includes("九宫格")) return "朋友圈图";
      if (task.name.includes("二维码")) return "二维码图";
      if (task.name.includes("现场")) return "现场照片";
      if (fileName.includes("长图")) return "长图";
      return "其他图片";
    }
    function fileThumb(item) {
      if (item.dataUrl) return `<img src="${item.dataUrl}" alt=""><span class="version">v${item.version}</span>`;
      return `图<span class="version">v${item.version}</span>`;
    }
    function renderHeader(title, desc, isRole = false) {
      return `
        <div class="page-head">
          <div>
            <div class="eyebrow">${isRole ? "ROLE WORKBENCH" : "PROJECT CONTROL"}</div>
            <h1>${title}</h1>
            <div class="sub">${desc}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
            <button class="btn" data-action="copy">复制今日摘要</button>
            <button class="btn primary" data-action="new-task">新增任务</button>
          </div>
        </div>
      `;
    }
    function renderReminder(text) {
      return `<div class="reminder"><span>${text}</span><b>当前项目：5月月底课程活动</b></div>`;
    }
    function renderOverview() {
      const done = tasks.filter(t => t.status === "done").length;
      const doing = tasks.filter(t => t.status === "doing").length;
      const risk = tasks.filter(t => t.status === "risk").length;
      const rate = Math.round(done / tasks.length * 100);
      const centerCards = [
        ["招商中心", "investment", "确认到场 38/80", "48%"],
        ["市场中心", "market", "12 项市场任务", "17%"],
        ["项目图片库", "images", `${images.length} 张图片`, "最新版"],
        ["风险任务", "overview", `${risk} 项风险`, "需处理"]
      ];
      app.innerHTML = `
        ${renderHeader("5月月底课程活动", "管理者视角：看整体进度、部门风险和关键产出。")}
        <section class="overview-grid">
          <div class="summary-hero panel">
            <div class="countdown"><div><strong>17</strong><br><span>天后开课</span></div><span>当前阶段：集中邀约与市场预热</span></div>
            <div class="summary-body">
              <div class="panel-title"><span>整体完成度</span><span>${rate}%</span></div>
              <div class="progress"><span style="width:${Math.max(rate, 8)}%"></span></div>
              <div class="stat-grid">
                <div class="stat"><b>${done}</b><span>已完成</span></div>
                <div class="stat"><b>${doing}</b><span>进行中</span></div>
                <div class="stat"><b>${risk}</b><span>风险任务</span></div>
                <div class="stat"><b>38/80</b><span>确认到场</span></div>
              </div>
            </div>
          </div>
          <div class="panel pad">
            <div class="panel-title"><span>风险提醒</span><button class="seg" data-jump-page="overview">处理</button></div>
            <div class="risk-list">${tasks.filter(t => t.status === "risk").map(t => `<div class="risk"><b>${t.role}</b> ${t.name}<br>${t.note}</div>`).join("")}</div>
          </div>
        </section>
        <section class="center-grid">
          ${centerCards.map(c => `<button class="center-card panel" data-jump-page="${c[1]}"><h3>${c[0]}</h3><div class="sub">${c[2]}</div><div class="rate">${c[3]}</div><div class="progress"><span style="width:${c[3].includes("%") ? c[3] : "56%"}"></span></div></button>`).join("")}
        </section>
      `;
    }
    function renderRole(p) {
      const info = roleMap[p];
      let list = pageTasks(p);
      if (statusFilter !== "all") list = list.filter(t => t.status === statusFilter);
      const selected = tasks.find(t => t.id === selectedTaskId && pageTasks(p).some(x => x.id === t.id)) || list[0] || pageTasks(p)[0];
      if (selected) selectedTaskId = selected.id;
      app.innerHTML = `
        ${renderHeader(info.title, info.desc, true)}
        ${renderReminder(info.note)}
        <section class="role-layout">
          <div class="panel pad">
            <div class="panel-title"><span>${info.title}任务</span><span>${list.length}项</span></div>
            <div class="toolbar">
              <input class="search" id="search" placeholder="搜索任务、负责人、备注" />
              ${["all","todo","doing","done","risk"].map(s => `<button class="seg ${statusFilter===s?"active":""}" data-status="${s}">${s==="all"?"全部":statusText(s)}</button>`).join("")}
            </div>
            <div class="task-list" id="taskList">
              ${list.map(t => `
                <div class="task ${t.id===selectedTaskId?"selected":""}" data-task="${t.id}">
                  <button class="check ${t.status==="done"?"done":""}" data-toggle="${t.id}">${t.status==="done"?"✓":""}</button>
                  <div><div class="task-name">${t.name}</div><div class="task-note">${t.owner} · 截止 ${t.due} · ${t.note}</div></div>
                  <span class="tag ${taskImages(t.id).length ? "done" : "todo"}">${taskImages(t.id).length ? taskImages(t.id).length + "张图" : "无图片"}</span>
                  <span class="tag ${t.status}">${statusText(t.status)}</span>
                </div>
              `).join("")}
            </div>
          </div>
          ${renderDetail(selected)}
        </section>
      `;
    }
    function renderDetail(task) {
      if (!task) return `<aside class="detail panel"><div class="panel-title">任务详情</div><div class="sub">暂无任务</div></aside>`;
      const imgs = taskImages(task.id);
      const files = taskFiles(task.id);
      return `
        <aside class="detail panel">
          <div class="panel-title"><span>任务详情</span><span class="tag ${task.status}">${statusText(task.status)}</span></div>
          <h2>${task.name}</h2>
          <div class="sub">${task.role} · ${task.owner} · 截止 ${task.due}</div>
          <div class="field"><div class="label">备注</div><textarea id="noteInput">${task.note}</textarea></div>
          <div class="field">
            <div class="label">上传成果</div>
            <input id="fileInput" type="file" multiple hidden>
            <button class="upload" id="upload"><span><b>上传任务成果</b>图片进入项目图片库；非图片只留在任务内</span></button>
            <div class="asset-list">
              ${imgs.map(img => `<div class="asset"><div class="thumb">${fileThumb(img)}</div><div><div class="asset-name">${img.name}</div><div class="asset-meta">${img.type} · ${img.status} · ${img.time}</div></div><button class="small-btn" data-new-version="${img.id}">新版本</button></div>`).join("")}
              ${files.map(file => `<div class="asset"><div class="thumb">件</div><div><div class="asset-name">${file.name}</div><div class="asset-meta">任务附件 · 不进图片库</div></div><button class="small-btn">查看</button></div>`).join("")}
              ${imgs.length + files.length === 0 ? `<div class="asset-meta">还没有成果。上传图片后会自动进入项目图片库。</div>` : ""}
            </div>
          </div>
          <div class="field">
            <div class="label">快速操作</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn primary" data-set-status="done">标记完成</button>
              <button class="btn" data-set-status="doing">进行中</button>
              <button class="btn danger" data-set-status="risk">标记风险</button>
            </div>
          </div>
        </aside>
      `;
    }
    function renderImages() {
      const list = images.filter(img => imageFilter === "all" || img.type === imageFilter);
      app.innerHTML = `
        ${renderHeader("项目图片库", "只沉淀图片类型成果，默认展示每张图的当前最新版。")}
        ${renderReminder("其他岗位取图统一从这里拿，避免微信群里找旧图。")}
        <section class="panel pad">
          <div class="panel-title"><span>图片素材</span><span>${list.length}张</span></div>
          <div class="toolbar">
            ${["all","海报","朋友圈图","长图","二维码图","现场照片","其他图片"].map(t => `<button class="seg ${imageFilter===t?"active":""}" data-image-filter="${t}">${t==="all"?"全部图片":t}</button>`).join("")}
          </div>
          <div class="image-grid">
            ${list.map(img => `<div class="image-card panel" data-source-task="${img.taskId}"><div class="image-preview">${fileThumb(img)}</div><div class="image-info"><b>${img.name}</b><div class="asset-meta">${img.type} · v${img.version} · ${img.status}<br>来源任务：${tasks.find(t=>t.id===img.taskId)?.name || ""}</div></div></div>`).join("") || `<div class="sub">暂无图片</div>`}
          </div>
        </section>
      `;
    }
    function render() {
      document.querySelectorAll("[data-page]").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));
      document.getElementById("imageCountNav").textContent = images.length;
      if (page === "overview") renderOverview();
      else if (page === "images") renderImages();
      else renderRole(page);
    }
    function uploadFiles(files) {
      const task = tasks.find(t => t.id === selectedTaskId);
      if (!task) return;
      Array.from(files).forEach(file => {
        if (file.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.onload = event => {
            images.unshift({
              id: Date.now() + Math.floor(Math.random()*1000),
              taskId: task.id,
              type: imageTypeForTask(task, file.name),
              name: file.name,
              owner: task.owner,
              role: task.role,
              version: 1,
              status: "待确认",
              time: "刚刚",
              dataUrl: String(event.target.result || "")
            });
            showToast("图片已进入项目图片库");
            render();
          };
          reader.readAsDataURL(file);
        } else {
          attachments.unshift({ id: Date.now(), taskId: task.id, name: file.name });
          showToast("非图片已作为任务附件保存");
          render();
        }
      });
    }
    document.getElementById("nav").addEventListener("click", event => {
      const btn = event.target.closest("[data-page]");
      if (!btn) return;
      page = btn.dataset.page;
      statusFilter = "all";
      render();
    });
    document.addEventListener("click", event => {
      const jump = event.target.closest("[data-jump-page]");
      if (jump) { page = jump.dataset.jumpPage; render(); return; }
      const taskRow = event.target.closest("[data-task]");
      if (taskRow && !event.target.closest("[data-toggle]")) { selectedTaskId = Number(taskRow.dataset.task); render(); return; }
      const toggle = event.target.closest("[data-toggle]");
      if (toggle) {
        const task = tasks.find(t => t.id === Number(toggle.dataset.toggle));
        task.status = task.status === "done" ? "doing" : "done";
        showToast(task.status === "done" ? "已完成" : "已恢复进行中");
        render();
        return;
      }
      const status = event.target.closest("[data-status]");
      if (status) { statusFilter = status.dataset.status; render(); return; }
      const setStatus = event.target.closest("[data-set-status]");
      if (setStatus) {
        const task = tasks.find(t => t.id === selectedTaskId);
        task.status = setStatus.dataset.setStatus;
        showToast("状态已更新");
        render();
        return;
      }
      const filter = event.target.closest("[data-image-filter]");
      if (filter) { imageFilter = filter.dataset.imageFilter; render(); return; }
      const source = event.target.closest("[data-source-task]");
      if (source) {
        selectedTaskId = Number(source.dataset.sourceTask);
        const task = tasks.find(t => t.id === selectedTaskId);
        page = Object.keys(roleMap).find(key => roleMap[key].role === task.role) || "overview";
        showToast("已定位到来源任务");
        render();
        return;
      }
      const version = event.target.closest("[data-new-version]");
      if (version) {
        const img = images.find(i => i.id === Number(version.dataset.newVersion));
        img.version += 1;
        img.status = "待确认";
        img.time = "刚刚";
        showToast("原型：已模拟上传新版本");
        render();
        return;
      }
      const action = event.target.closest("[data-action]");
      if (action && action.dataset.action === "new-task") {
        const role = roleMap[page]?.role || "运营";
        const id = Math.max(...tasks.map(t => t.id)) + 1;
        tasks.unshift({ id, role, name: "新任务：待填写", owner: "未分配", due: "05-20", status: "todo", note: "点击详情编辑备注。" });
        selectedTaskId = id;
        showToast("已新增任务");
        render();
      }
      if (action && action.dataset.action === "copy") {
        navigator.clipboard.writeText("今日项目摘要：请查看各岗位工作台任务和项目图片库最新版图片。").catch(()=>{});
        showToast("摘要已复制");
      }
    });
    document.addEventListener("input", event => {
      if (event.target.id === "noteInput") {
        const task = tasks.find(t => t.id === selectedTaskId);
        task.note = event.target.value;
      }
    });
    document.addEventListener("click", event => {
      if (event.target.closest("#upload")) document.getElementById("fileInput")?.click();
    });
    document.addEventListener("change", event => {
      if (event.target.id === "fileInput") uploadFiles(event.target.files);
    });
    document.addEventListener("dragover", event => {
      if (event.target.closest("#upload")) {
        event.preventDefault();
        event.target.closest("#upload").classList.add("dragging");
      }
    });
    document.addEventListener("dragleave", event => {
      if (event.target.closest("#upload")) event.target.closest("#upload").classList.remove("dragging");
    });
    document.addEventListener("drop", event => {
      if (event.target.closest("#upload")) {
        event.preventDefault();
        event.target.closest("#upload").classList.remove("dragging");
        uploadFiles(event.dataTransfer.files);
      }
    });
    document.getElementById("projectSelect").addEventListener("change", () => showToast("已切换项目原型"));
    render();
  </script>
</body>
</html>
